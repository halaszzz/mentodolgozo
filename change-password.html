<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEK - Jelszó módosítás</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login-wrapper">
    <div class="visual-side"></div>

    <div class="form-side">
      <div class="form-box">
        <h1>Jelszó módosítás</h1>
        <p>Az első belépéshez kötelező új jelszót megadni.</p>

        <form id="changePasswordForm" autocomplete="off">
          <div class="field">
            <label for="newPassword">Új jelszó</label>
            <input type="password" id="newPassword" placeholder="Új jelszó" required>
          </div>

          <div class="field">
            <label for="confirmPassword">Új jelszó újra</label>
            <input type="password" id="confirmPassword" placeholder="Új jelszó újra" required>
          </div>

          <button type="submit" class="submit-btn">Jelszó mentése</button>
        </form>

        <div class="footer-note">Első belépéses biztonsági jelszócsere</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://lsbdbfzeugqnurkmdhxh.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_GrhobqQt4uN4Cl5G9t1YmQ_KCKw-wFP";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function initPage() {
      const { data, error } = await sb.auth.getUser();

      if (error || !data?.user) {
        window.location.href = "index.html";
        return;
      }

      const { data: profile, error: profileError } = await sb
        .from("profiles")
        .select("is_admin, must_change_password")
        .eq("id", data.user.id)
        .single();

      if (profileError || !profile) {
        alert("Nem sikerült betölteni a profilt.");
        window.location.href = "index.html";
        return;
      }

      if (!profile.must_change_password) {
        if (profile.is_admin) {
          window.location.href = "admin.html";
        } else {
          window.location.href = "fooldal.html";
        }
      }
    }

    document.getElementById("changePasswordForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (newPassword.length < 6) {
        alert("Az új jelszó legalább 6 karakter legyen.");
        return;
      }

      if (newPassword !== confirmPassword) {
        alert("A két jelszó nem egyezik.");
        return;
      }

      const { data: userData, error: userError } = await sb.auth.getUser();
      if (userError || !userData?.user) {
        alert("Lejárt a munkamenet.");
        window.location.href = "index.html";
        return;
      }

      const { error: passwordError } = await sb.auth.updateUser({
        password: newPassword
      });

      if (passwordError) {
        alert("Nem sikerült módosítani a jelszót.");
        return;
      }

      const { error: profileError } = await sb
        .from("profiles")
        .update({ must_change_password: false })
        .eq("id", userData.user.id);

      if (profileError) {
        alert("A jelszó megváltozott, de a profil frissítése nem sikerült.");
        return;
      }

      const { data: profile } = await sb
        .from("profiles")
        .select("is_admin")
        .eq("id", userData.user.id)
        .single();

      alert("A jelszó sikeresen megváltozott.");

      if (profile?.is_admin) {
        window.location.href = "admin.html";
      } else {
        window.location.href = "fooldal.html";
      }
    });

    initPage();
  </script>
</body>
</html>
